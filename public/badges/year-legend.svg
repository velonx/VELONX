<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="grad-Year-Legend" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="black" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer Glow Glow Layer -->
  <polygon points="50,3 97,38 79,92 21,92 3,38" fill="#ec4899" opacity="0.15" filter="url(#shadow)" />

  <!-- Outer Shield border -->
  <polygon points="50,3 97,38 79,92 21,92 3,38" fill="none" stroke="#f472b6" stroke-width="3" />

  <!-- Shield Body -->
  <polygon points="50,3 97,38 79,92 21,92 3,38" fill="url(#grad-Year-Legend)" transform="scale(0.9) translate(5.5, 5.5)" />

  <!-- Centered Icon (Standardized bounds) -->
  <g transform="translate(38, 32) scale(1)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3.5z" stroke="white" stroke-width="3" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Badge Name Label -->
  <text x="50%" y="82%" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="6px" letter-spacing="0.5" opacity="0.95" text-transform="uppercase">
    Year Legend
  </text>
</svg>